<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — ResumeFlow</title>
    <meta name="description" content="Log in to your ResumeFlow account." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <main class="auth-page">
        <section class="auth-form-side">
            <a href="index.html" class="logo auth-logo">ResumeFlow</a>

            <h1 class="modal-title">Welcome back</h1>
            <p class="modal-subtitle">Log in to keep building the resume that gets you hired.</p>

            <form class="auth-form" onsubmit="return false;">
                <p class="form-field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" placeholder="you@example.com" required />
                </p>

                <p class="form-field password-field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required />
                    <button type="button" class="toggle-password" data-target="login-password" aria-label="Show password">👁️</button>
                </p>

                <p class="form-row">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" />
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </p>

                <button type="submit" class="btn btn-primary btn-lg">Log In</button>
            </form>

            <p class="auth-divider">or continue with</p>

            <p class="social-row">
                <button type="button" class="btn-social">
                    <svg viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.25 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.9 1.5l2.6-2.5C16.9 3.4 14.7 2.4 12 2.4 6.9 2.4 2.7 6.6 2.7 11.7S6.9 21 12 21c6.9 0 8.3-4.8 8.3-7.4 0-.5 0-.9-.1-1.4H12z"/></svg>
                    Google
                </button>
                <button type="button" class="btn-social">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.3 6.8 9.6.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.4-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.6 2.3 1.1 2.9.8.1-.7.4-1.1.6-1.4-2.2-.3-4.6-1.2-4.6-5.2 0-1.1.4-2 1-2.8-.1-.3-.5-1.4.1-2.9 0 0 .8-.3 2.7 1a9 9 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .6 1.5.2 2.6.1 2.9.6.8 1 1.7 1 2.8 0 4-2.4 4.9-4.7 5.2.4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5 3.9-1.3 6.8-5.1 6.8-9.6C22 6.6 17.5 2 12 2Z"/></svg>
                    GitHub
                </button>
            </p>

            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
        </section>

        <section class="auth-image-side">
            <img src="../images/resume.jpeg" alt="ResumeFlow dashboard preview" />
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
